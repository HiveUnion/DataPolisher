name: build

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            artifact_name: DataPolisher-macOS
            artifact_path: dist/DataPolisher.app
          - os: windows-latest
            artifact_name: DataPolisher-Windows
            artifact_path: dist/DataPolisher

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit tests
        env:
          PYTHONPATH: .
        run: python -m unittest discover -s tests

      - name: Build standalone bundle
        run: python build_app.py

      - name: Package macOS app (preserve .app structure)
        if: runner.os == 'macOS'
        run: ditto -c -k --keepParent dist/DataPolisher.app dist/DataPolisher-macOS.zip

      - name: Upload artifact (macOS)
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/DataPolisher-macOS.zip

      - name: Upload artifact (Windows)
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
